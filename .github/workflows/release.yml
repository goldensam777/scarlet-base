name: Release

# Triggers when you push a tag like v1.0.0
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # required so electron-builder can create/upload the GitHub Release

jobs:
  release:
    name: Build & publish (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build --if-present

      - name: Build & publish (draft release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always

  # After all 3 platforms have uploaded their artifacts to the (draft) release,
  # this flips it from draft to published in one go.
  publish-release:
    name: Publish GitHub Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark release as published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release edit "$TAG" --draft=false --repo "${{ github.repository }}"
