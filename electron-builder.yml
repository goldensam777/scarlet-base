appId: com.leumaslabs.scarletbase
productName: Scarlet Base
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
win:
  target:
    - nsis
    - portable
    - msi
linux:
  target:
    - AppImage
    - deb
publish:
  provider: github
  owner: goldensam777
  repo: scarlet-base
